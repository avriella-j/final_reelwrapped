<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Trend - ReelWrapped Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .admin-edit-trend {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        
        .admin-header {
            background: linear-gradient(135deg, #E1306C 0%, #F77737 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .admin-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }
        
        .edit-form {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .form-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #E1306C;
        }
        
        .form-group select {
            cursor: pointer;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #E1306C;
            color: white;
        }
        
        .btn-primary:hover {
            background: #b32756;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        @media (max-width: 768px) {
            .admin-header {
                text-align: center;
            }
            
            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="admin-edit-trend">
        <div class="admin-header">
            <h1 class="admin-title">Edit Trend</h1>
        </div>

        <div class="edit-form">
            <h2 class="form-title">Edit Trend: {{ trend.name }}</h2>
            
            <form method="POST">
                <div class="form-group">
                    <label for="name">Trend Name</label>
                    <input type="text" id="name" name="name" value="{{ trend.name }}" required>
                </div>

                <div class="form-group">
                    <label for="count">Count/Interactions</label>
                    <input type="number" id="count" name="count" value="{{ trend.count }}" min="0" required>
                </div>

                <div class="form-group">
                    <label for="trend_type">Trend Type</label>
                    <select id="trend_type" name="trend_type" required>
                        <option value="hashtag" {% if trend.trend_type == 'hashtag' %}selected{% endif %}>Hashtag</option>
                        <option value="music" {% if trend.trend_type == 'music' %}selected{% endif %}>Music</option>
                        <option value="creator" {% if trend.trend_type == 'creator' %}selected{% endif %}>Creator</option>
                    </select>
                </div>

                <div class="form-actions">
                    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
